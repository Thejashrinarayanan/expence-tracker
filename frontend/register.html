<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>🌸🏡 Home Minister's Budget Book 🌸 - Register</title>
  <link rel="stylesheet" href="css/login.css">
</head>

<body>

  <div class="overlay">

    <div class="login-card">

      <h1>🌸🏡 Home Minister's Budget Book 🌸</h1>

      <p class="welcome">Create your account to start tracking 💖</p>

      <h2>Register</h2>

      <input type="text" id="name" placeholder="👩 Enter Name">
      <input type="email" id="email" placeholder="📧 Enter Email">
      <input type="password" id="password" placeholder="🔒 Enter Password">

      <button id="registerBtn">🌷 Register</button>

      <p class="register-text">Already have an account?</p>
      <a class="register-link" href="index.html">✨ Login Here</a>

    </div>

  </div>

  <!-- External JS -->
  <script src="js/register.js"></script>

</body>

</html>
